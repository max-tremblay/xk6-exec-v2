name: Validate

permissions: {}

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate
    uses: grafana/xk6/.github/workflows/extension-validate.yml@b302a90014ee698bbf3c9f7c908b79ec8dd8053b # v1.4.6
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      go-version: "1.25.x"
      go-versions: '["1.25.x"]'
      golangci-lint-version: "v2.7.1"
      platforms: '["ubuntu-latest", "windows-latest", "macos-latest"]'
      k6-versions: '["v2.1.0", "v2.0.0"]'
      xk6-version: "1.4.6"
